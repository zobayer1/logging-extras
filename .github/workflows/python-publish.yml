name: PyPi Publish

on:
  release:
    types: [published]

  workflow_dispatch:

jobs:
  deploy:

    runs-on: ubuntu-latest

    # Trusted Publishing (OIDC) requires an OIDC token to be issued for the
    # job. ``contents: read`` keeps the checkout step working without
    # granting the workflow any extra write surface. See
    # https://docs.pypi.org/trusted-publishers/ for the PyPI-side setup
    # (one-time: add a Trusted Publisher for this repo + workflow in the
    # PyPI project settings).
    permissions:
      id-token: write
      contents: read

    steps:
    - uses: actions/checkout@v5
      with:
        fetch-depth: 0
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
    - name: Install build tooling
      run: |
        python -m pip install --upgrade pip
        pip install build
    - name: Build
      run: python -m build
    - name: Publish
      uses: pypa/gh-action-pypi-publish@release/v1
